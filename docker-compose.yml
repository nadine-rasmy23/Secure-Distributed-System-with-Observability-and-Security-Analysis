# ============================================
# Docker Compose - HTTPS Mode (Primary)
# Secure Distributed System
# ============================================

services:
  # ---- PostgreSQL Database ----
  db:
    image: postgres:15-alpine
    container_name: audit_db
    environment:
      POSTGRES_DB: audit_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - app_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ---- RabbitMQ Message Broker ----
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 10s
      retries: 5

  # ---- API Instance 1 ----
  api1:
    build: ./api
    container_name: api1
    environment:
      API_INSTANCE: api1
      JWT_SECRET: super-secret-key-for-jwt-2024
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USER: guest
      RABBITMQ_PASS: guest
      DB_HOST: db
      DB_NAME: audit_db
      DB_USER: postgres
      DB_PASS: postgres
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - app_network

  # ---- API Instance 2 ----
  api2:
    build: ./api
    container_name: api2
    environment:
      API_INSTANCE: api2
      JWT_SECRET: super-secret-key-for-jwt-2024
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USER: guest
      RABBITMQ_PASS: guest
      DB_HOST: db
      DB_NAME: audit_db
      DB_USER: postgres
      DB_PASS: postgres
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - app_network

  # ---- API Instance 3 ----
  api3:
    build: ./api
    container_name: api3
    environment:
      API_INSTANCE: api3
      JWT_SECRET: super-secret-key-for-jwt-2024
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USER: guest
      RABBITMQ_PASS: guest
      DB_HOST: db
      DB_NAME: audit_db
      DB_USER: postgres
      DB_PASS: postgres
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - app_network

  # ---- Worker Service ----
  worker:
    build: ./worker
    container_name: worker
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USER: guest
      RABBITMQ_PASS: guest
      DB_HOST: db
      DB_NAME: audit_db
      DB_USER: postgres
      DB_PASS: postgres
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - app_network

  # ---- Nginx Gateway (HTTPS + Load Balancer + Rate Limiter) ----
  nginx:
    image: nginx:alpine
    container_name: nginx_gateway
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./nginx/certs:/etc/nginx/certs
    depends_on:
      - api1
      - api2
      - api3
    networks:
      - app_network

volumes:
  postgres_data:

networks:
  app_network:
    driver: bridge
