# ============================================
# Nginx Configuration - HTTPS Mode
# Load Balancing + Rate Limiting + SSL
# ============================================

# Rate limiting zone: 5 requests per second per client IP
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=5r/s;

# Upstream: load balance across 3 API instances (round-robin)
upstream api_backend {
    server api1:5000;
    server api2:5000;
    server api3:5000;
}

# HTTP server: redirect all traffic to HTTPS
server {
    listen 80;
    server_name localhost;

    # Redirect HTTP to HTTPS
    return 301 https://$host$request_uri;
}

# HTTPS server
server {
    listen 443 ssl;
    server_name localhost;

    # SSL Certificate Configuration
    ssl_certificate     /etc/nginx/certs/server.crt;
    ssl_certificate_key /etc/nginx/certs/server.key;

    # SSL Security Settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Proxy settings for all API endpoints
    location / {
        # Apply rate limiting (burst of 10, no delay for first 5)
        limit_req zone=api_limit burst=10 nodelay;
        limit_req_status 429;

        # Proxy to API backend
        proxy_pass http://api_backend;

        # Close connection to upstream after each request (ensures round-robin)
        proxy_set_header Connection "";

        # Preserve original client information
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_connect_timeout 30s;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    # Custom error pages
    error_page 429 /429.json;
    location = /429.json {
        default_type application/json;
        return 429 '{"error": "Too Many Requests", "message": "Rate limit exceeded. Please try again later."}';
    }
}
